<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Stock Chart</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test API Stock Chart</h1>
    
    <div id="results"></div>

    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            const tests = [
                { name: 'Basic Stock Chart', url: '/web-monitoring/public/api_stock_chart.php' },
                { name: 'Stock Habis Detail', url: '/web-monitoring/public/api_stock_chart.php?detail=habis' },
                { name: 'Stock Menipis Detail', url: '/web-monitoring/public/api_stock_chart.php?detail=menipis' },
                { name: 'Stock Siap Detail', url: '/web-monitoring/public/api_stock_chart.php?detail=siap' }
            ];
            
            for (const test of tests) {
                const testDiv = document.createElement('div');
                testDiv.className = 'test';
                
                try {
                    console.log(`Testing: ${test.name} - ${test.url}`);
                    
                    const response = await fetch(test.url);
                    const data = await response.json();
                    
                    testDiv.className += ' success';
                    testDiv.innerHTML = `
                        <h3>✅ ${test.name}</h3>
                        <p><strong>URL:</strong> ${test.url}</p>
                        <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                        <p><strong>Data Type:</strong> ${Array.isArray(data) ? 'Array' : typeof data}</p>
                        ${Array.isArray(data) ? 
                            `<p><strong>Items:</strong> ${data.length}</p>` : 
                            `<p><strong>Items:</strong> ${data.items ? data.items.length : 'N/A'}</p>`
                        }
                        <details>
                            <summary>Show Raw Data</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    `;
                } catch (error) {
                    testDiv.className += ' error';
                    testDiv.innerHTML = `
                        <h3>❌ ${test.name}</h3>
                        <p><strong>URL:</strong> ${test.url}</p>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <pre>${error.stack}</pre>
                    `;
                }
                
                results.appendChild(testDiv);
            }
        }
        
        // Run tests when page loads
        window.onload = testAPI;
    </script>
</body>
</html>
